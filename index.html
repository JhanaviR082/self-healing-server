<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hlllleoooooooo ! Self-Healing Server</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d0f;
      color: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #161618;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    h1 { font-size: 28px; margin-bottom: 12px; }
    .status {
      background: rgba(48,209,88,0.1);
      color: #30d158;
      display: inline-block;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      margin: 20px 0;
    }
    .metrics {
      background: #1c1c1e;
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      margin: 12px 0;
      font-size: 14px;
    }
    .bar {
      height: 4px;
      background: #2c2c2e;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 4px;
    }
    .bar-fill {
      height: 100%;
      background: #30d158;
      border-radius: 4px;
      width: 0%;
    }
    .footer {
      font-size: 12px;
      color: #98989f;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛡️ Self-Healing Sererrrrrrrrrrrrr</h1>
    <p>Auto-healing active · Monitoring all services</p>
    <div class="status">✅ All Systems Operational</div>

    <div class="metrics">
      <div class="metric">
        <span>💻 CPU Usage</span>
        <span id="cpu-val">0%</span>
      </div>
      <div class="bar"><div class="bar-fill" id="cpu-bar"></div></div>

      <div class="metric">
        <span>🧠 Memory Usage</span>
        <span id="mem-val">0%</span>
      </div>
      <div class="bar"><div class="bar-fill" id="mem-bar"></div></div>

      <div class="metric">
        <span>💾 Disk Usage</span>
        <span id="disk-val">0%</span>
      </div>
      <div class="bar"><div class="bar-fill" id="disk-bar"></div></div>
    </div>

    <div class="footer" id="timestamp">Last updated: --:--:--</div>
  </div>

  <script>
    function updateMetrics() {
      const cpu = Math.floor(Math.random() * 40) + 10;
      const mem = Math.floor(Math.random() * 50) + 30;
      const disk = Math.floor(Math.random() * 30) + 20;

      document.getElementById('cpu-val').textContent = cpu + '%';
      document.getElementById('mem-val').textContent = mem + '%';
      document.getElementById('disk-val').textContent = disk + '%';

      document.getElementById('cpu-bar').style.width = cpu + '%';
      document.getElementById('mem-bar').style.width = mem + '%';
      document.getElementById('disk-bar').style.width = disk + '%';

      document.getElementById('timestamp').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    }

    updateMetrics();
    setInterval(updateMetrics, 3000);
  </script>
</body>
</html>
