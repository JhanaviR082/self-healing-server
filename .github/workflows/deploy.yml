name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # CI: Tests run on GitHub's servers
test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install HTML validator
        run: sudo apt-get install -y tidy
      
      - name: Validate HTML
        run: |
          echo "🧪 Validating HTML..."
          
          if tidy -e index.html 2>&1 | grep -q "Error"; then
            echo "❌ HTML errors found:"
            tidy -e index.html
            exit 1
          fi
          
          echo "✅ HTML is valid!"

  # CD: Deploy runs on self-hosted runner (your VM)
deploy:
    needs: test
    runs-on: self-hosted
    
    steps:
      - name: Checkout code on VM
        uses: actions/checkout@v4
      
      - name: Deploy to web directory
        run: |
          echo "🚀 Deploying to web directory..."
          sudo cp index.html /var/www/html/
          
          if [ -f dashboard.html ]; then
            sudo cp dashboard.html /var/www/html/
          fi
          
          sudo systemctl reload nginx
          echo "✅ Deployment completed!"
