name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # CI: Tests run on GitHub's servers
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test HTML files
        run: |
          echo "🧪 Testing HTML files..."
          
          if [ ! -f index.html ]; then
            echo "❌ index.html missing!"
            exit 1
          fi
          echo "✅ index.html exists"
          
          if grep -q "<html" index.html; then
            echo "✅ index.html valid"
          else
            echo "❌ index.html missing <html> tag"
            exit 1
          fi

  # CD: Deploy runs on self-hosted runner (your VM)
  deploy:
    needs: test
    runs-on: self-hosted
    
    steps:
      - name: Checkout code on VM
        uses: actions/checkout@v4
      
      - name: Deploy to web directory
        run: |
          echo "🚀 Deploying to web directory..."
          sudo cp index.html /var/www/html/
          
          if [ -f dashboard.html ]; then
            sudo cp dashboard.html /var/www/html/
          fi
          
          sudo systemctl reload nginx
          echo "✅ Deployment completed!"
